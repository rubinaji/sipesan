<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPESAN Login</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#2e7d32,#43a047,#66bb6a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:350px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#2e7d32;
    margin-bottom:5px;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#2e7d32;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}

#pesan{
    margin-top:15px;
    text-align:center;
    color:red;
}

</style>
</head>

<body>

<div class="box">

<h1>♻️ SIPESAN</h1>

<p>Sistem Pengangkutan Sampah Online</p>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<div id="pesan"></div>

</div>

<script>

function login(){

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(username === "admin" && password === "admin123"){
        window.location.href = "admin.html";
    }

    else if(username === "mitra" && password === "123456"){
        window.location.href = "mitra.html";
    }

    else if(username === "nasabah" && password === "123456"){
        window.location.href = "nasabah.html";
    }

    else{
        document.getElementById("pesan").innerHTML =
        "Username atau Password salah";
    }

}

</script>

</body>
</html>
