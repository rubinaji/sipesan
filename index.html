<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SIPESAN Login</title>
<style>
body{
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}
.box{
    width:300px;
    background:white;
    padding:20px;
    border-radius:10px;
}
input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="box">
<h2>SIPESAN LOGIN</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="pesan"></p>
</div>

<script>
function login(){
    const username=document.getElementById("username").value;
    const password=document.getElementById("password").value;

    if(username==="admin" && password==="admin123"){
        document.getElementById("pesan").innerHTML="Login Admin Berhasil";
    }
    else if(username==="mitra" && password==="123456"){
        document.getElementById("pesan").innerHTML="Login Mitra Berhasil";
    }
    else if(username==="nasabah" && password==="123456"){
        document.getElementById("pesan").innerHTML="Login Nasabah Berhasil";
    }
    else{
        document.getElementById("pesan").innerHTML="Username atau Password salah";
    }
}
</script>

</body>
</html>
