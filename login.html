<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SIPESAN Login</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:350px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
}

button:hover{
    background:#0b5ed7;
}
</style>
</head>

<body>

<div class="box">

<h2>♻️ SIPESAN</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<p id="status"></p>

</div>

<script>

function login(){

    let username=document.getElementById("username").value;
    let password=document.getElementById("password").value;

    if(username=="admin" && password=="admin"){
        window.location="admin.html";
    }
    else if(username=="mitra" && password=="123456"){
        window.location="mitra.html";
    }
    else if(username=="nasabah" && password=="123456"){
        window.location="nasabah.html";
    }
    else{
        document.getElementById("status").innerHTML=
        "Username atau password salah";
    }

}

</script>

</body>
</html>
